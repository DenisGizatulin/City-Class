version: '3.8'

services:
  # 1. Веб-сервер Nginx (Отвечает за HTML, CSS, JS и картинки)
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # 2. Обработчик PHP (PHP-FPM)
  php:
    build: .
    volumes:
      - .:/var/www/html

  # 3. База данных MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: 'site'
      MYSQL_ROOT_PASSWORD: 'root'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # 4. Удобный визуальный интерфейс для базы данных (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80" # phpMyAdmin будет доступен на порту 8081
    environment:
      PMA_HOST: db # Указываем phpMyAdmin, к какому контейнеру с БД подключаться
      PMA_PORT: 3306
    depends_on:
      - db # Запускать только после того, как запустится база данных

volumes:
  db_data: