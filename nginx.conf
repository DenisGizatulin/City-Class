server {
    listen 80;
    server_name localhost;
    
    # Папка, где лежат файлы сайта внутри контейнера
    root /var/www/html;
    
    # Указываем Nginx принудительно использовать UTF-8 для всех текстовых файлов
    charset utf-8;
    
    # Какие файлы открывать по умолчанию
    index index.html index.php;

    # Обработка обычных файлов (HTML, CSS, картинки, txt)
    location / {
        try_files $uri $uri/ =404;
    }

    # Обработка PHP-скриптов
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}